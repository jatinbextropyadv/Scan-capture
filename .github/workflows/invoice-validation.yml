name: Invoice Validation

on:
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run TestNG suite
        shell: cmd
        env:
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
        run: mvn -B -ntp test

      # Extent report + updated Excel
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            reports/**
          if-no-files-found: warn

      # THE IMPORTANT ONE: surefire results contain the actual failure reason
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            target/surefire-reports/**
          if-no-files-found: warn
